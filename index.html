<!DOCTYPE html>
<html>
<head>
  <title>Math Battle</title>
</head>
<body>

<h1>수학 배틀</h1>

<!-- 모드 선택 -->
<div id="menu">
  <button onclick="startGame('time')">타임어택</button>
  <button onclick="startGame('ai')">AI 배틀</button>
</div>

<!-- 게임 화면 -->
<div id="game" style="display:none;">
  <h2 id="modeTitle"></h2>
  <h2 id="question"></h2>

  <input type="number" id="answer">
  <button onclick="checkAnswer()">제출</button>

  <p id="result"></p>

  <p>내 점수: <span id="score">0</span></p>
  <p id="aiScoreText" style="display:none;">AI 점수: <span id="aiScore">0</span></p>

  <p id="timer">시간: 30</p>

  <button onclick="location.reload()">다시하기</button>
</div>

<script src="script.js"></script>

</body>
</html>
